<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>田宮裕涼 打席分析システム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;700;900&family=Oswald:wght@300;400;600;700&display=swap');

:root {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --ink: #1a1814;
  --ink2: #4a4640;
  --ink3: #8a8480;
  --accent: #c8460a;
  --accent2: #1a5fa8;
  --accent3: #1a7a3a;
  --border: #ddd9d0;
  --shadow: rgba(26,24,20,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--ink);
  padding: 20px 24px 16px;
  display: flex;
  align-items: flex-end;
  gap: 16px;
  border-bottom: 3px solid var(--accent);
}
.header-num {
  font-family: 'Oswald', sans-serif;
  font-size: 56px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  opacity: 0.9;
}
.header-info { flex:1; }
.header-name {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 2px;
}
.header-sub {
  font-size: 11px;
  color: #888;
  letter-spacing: 1px;
  margin-top: 2px;
}
.header-badge {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 10px;
  border-radius: 2px;
  align-self: center;
}

/* QUICK STATS */
.quick-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.qs-item {
  background: var(--surface);
  padding: 12px 16px;
  text-align: center;
}
.qs-val {
  font-family: 'Oswald', sans-serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1;
}
.qs-val.good { color: var(--accent3); }
.qs-val.bad  { color: var(--accent); }
.qs-label {
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 3px;
}

/* SEARCH BAR */
.search-wrap {
  padding: 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px var(--shadow);
}
.search-label {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.search-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.search-input {
  flex: 1;
  min-width: 160px;
  padding: 10px 14px;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--accent2); }
.search-btn {
  padding: 10px 20px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s;
}
.search-btn:hover { background: var(--accent); }
.quick-btns {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}
.qbtn {
  padding: 5px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 11px;
  background: var(--bg);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Zen Kaku Gothic New', sans-serif;
}
.qbtn:hover, .qbtn.active {
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
}

/* MAIN */
.main { padding: 16px; max-width: 800px; margin: 0 auto; }

/* RESULT PANEL */
.result-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }

.panel-header {
  background: var(--ink);
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.panel-title {
  font-family: 'Oswald', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.panel-tag {
  font-size: 10px;
  background: var(--accent);
  padding: 2px 8px;
  border-radius: 2px;
  letter-spacing: 1px;
}
.panel-body { padding: 16px; }

/* VERDICT BOX */
.verdict {
  border-left: 3px solid var(--accent);
  background: #fff8f5;
  padding: 12px 14px;
  margin-bottom: 14px;
  border-radius: 0 4px 4px 0;
}
.verdict-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--accent);
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 6px;
}
.verdict p { font-size: 13px; line-height: 1.8; color: var(--ink); }

.verdict-blue {
  border-left-color: var(--accent2);
  background: #f5f8ff;
}
.verdict-blue .verdict-label { color: var(--accent2); }

.verdict-green {
  border-left-color: var(--accent3);
  background: #f5fff8;
}
.verdict-green .verdict-label { color: var(--accent3); }

/* MINI BARS */
.bar-section { margin-bottom: 14px; }
.bar-title { font-size: 10px; letter-spacing: 1px; color: var(--ink3); text-transform: uppercase; margin-bottom: 8px; }
.mini-bar { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.mini-bar-label { width:90px; font-size:11px; color:var(--ink2); text-align:right; flex-shrink:0; }
.mini-bar-track { flex:1; height:16px; background:var(--surface2); border-radius:2px; overflow:hidden; }
.mini-bar-fill {
  height:100%; border-radius:2px;
  display:flex; align-items:center; padding-left:6px;
  font-size:10px; font-weight:700;
  transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
}
.fill-red { background: var(--accent); color:#fff; }
.fill-blue { background: var(--accent2); color:#fff; }
.fill-green { background: var(--accent3); color:#fff; }
.fill-gray { background: #aaa; color:#fff; }

/* ZONE */
.zone-mini {
  display: inline-grid;
  grid-template-columns: repeat(3, 40px);
  grid-template-rows: repeat(3, 40px);
  gap: 2px;
  border: 2px solid var(--ink);
  padding: 3px;
  background: var(--surface2);
  border-radius: 3px;
}
.zone-cell-mini {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  border-radius:2px; font-size:9px; font-weight:700; line-height:1.2;
  color: var(--ink);
}
.zone-cell-mini .pct { font-size:8px; opacity:0.8; }

/* COUNT GRID */
.count-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.count-cell {
  background: var(--surface2);
  border-radius: 4px;
  padding: 8px 6px;
  text-align: center;
  border: 1px solid var(--border);
}
.count-cnt { font-family:'Oswald',sans-serif; font-size:13px; font-weight:600; }
.count-lbl { font-size:9px; color:var(--ink3); margin-bottom:2px; }
.count-action { font-size:9px; margin-top:3px; }
.action-go { color: var(--accent3); font-weight:700; }
.action-wait { color: var(--accent2); font-weight:700; }
.action-care { color: var(--accent); font-weight:700; }

/* DIVIDER */
.divider { border:none; border-top:1px solid var(--border); margin:12px 0; }

/* EMPTY STATE */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--ink3);
}
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-title { font-size: 16px; font-weight: 700; color: var(--ink2); margin-bottom: 6px; }
.empty-sub { font-size: 13px; line-height: 1.6; }

/* AB LOG */
.ab-log { display:flex; flex-direction:column; gap:6px; }
.ab-row {
  display:flex; align-items:flex-start; gap:10px;
  padding:10px 12px;
  background:var(--surface2);
  border-radius:4px;
  border-left:3px solid transparent;
}
.ab-row.hit { border-left-color: var(--accent3); }
.ab-row.out { border-left-color: var(--border); }
.ab-row.k   { border-left-color: var(--accent); }
.ab-date { font-size:10px; color:var(--ink3); white-space:nowrap; margin-top:1px; }
.ab-main { flex:1; }
.ab-result { font-size:12px; font-weight:700; }
.ab-result.hit { color:var(--accent3); }
.ab-result.k   { color:var(--accent); }
.ab-pitch { font-size:11px; color:var(--ink2); margin-top:2px; }
.ab-memo { font-size:11px; color:var(--ink3); margin-top:3px; line-height:1.5; }

/* TABS */
.tabs { display:flex; gap:0; border-bottom:2px solid var(--border); margin-bottom:16px; }
.tab {
  padding:10px 16px; font-size:12px; font-weight:700; letter-spacing:1px;
  cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px;
  color:var(--ink3); transition:all 0.15s;
  font-family:'Zen Kaku Gothic New',sans-serif;
}
.tab.active { color:var(--ink); border-bottom-color:var(--accent); }

/* PROFILE PHOTO */
.profile-photo {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  object-fit: cover;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  flex-shrink: 0;
}
.profile-photo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.profile-photo-placeholder {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 2px solid var(--accent);
  background: #2a2a2a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 0.2s;
}
.profile-photo-placeholder:hover { border-color: #fff; }
#photoInput { display: none; }

/* TREND SECTION */
.trend-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px;
}
.trend-title {
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 12px;
  font-weight: 700;
}
.trend-tabs {
  display: flex;
  gap: 0;
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.trend-tab {
  padding: 6px 14px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  color: var(--ink3);
  transition: all 0.15s;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  letter-spacing: 1px;
}
.trend-tab.active { color: var(--ink); border-bottom-color: var(--accent); }

/* CHART */
.chart-wrap {
  position: relative;
  height: 120px;
  margin-bottom: 8px;
}
.chart-svg { width: 100%; height: 100%; }
.chart-grid-line { stroke: var(--border); stroke-width: 0.5; stroke-dasharray: 3,3; }
.chart-line { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.chart-line-ops { fill: none; stroke: var(--accent2); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4,2; }
.chart-area { fill: url(#areaGrad); opacity: 0.3; }
.chart-dot { fill: var(--accent); stroke: var(--surface); stroke-width: 2; cursor: pointer; }
.chart-dot-ops { fill: var(--accent2); stroke: var(--surface); stroke-width: 2; }
.chart-label { font-size: 9px; fill: var(--ink3); font-family: sans-serif; }
.chart-val { font-size: 9px; fill: var(--accent); font-family: sans-serif; font-weight: 700; }

/* TREND STATS ROW */
.trend-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 8px;
}
.ts-item {
  background: var(--surface2);
  border-radius: 4px;
  padding: 8px 10px;
  text-align: center;
}
.ts-val {
  font-family: 'Oswald', sans-serif;
  font-size: 18px;
  font-weight: 600;
  line-height: 1;
}
.ts-lbl {
  font-size: 9px;
  color: var(--ink3);
  letter-spacing: 1px;
  margin-top: 2px;
  text-transform: uppercase;
}
.ts-diff {
  font-size: 10px;
  font-weight: 700;
  margin-top: 2px;
}
.diff-up { color: var(--accent3); }
.diff-down { color: var(--accent); }
.diff-flat { color: var(--ink3); }

/* FOOTER */
.footer {
  text-align:center; padding:20px; color:var(--ink3);
  font-size:10px; letter-spacing:1px; border-top:1px solid var(--border);
  margin-top:24px;
}

@media(max-width:480px){
  .quick-stats { grid-template-columns:repeat(2,1fr); }
  .count-grid { grid-template-columns:repeat(2,1fr); }
  .qs-val { font-size:20px; }
}
</style>
</head>
<body class="tamiya-locked">
<style id="tamiya-lock-style">
  body.tamiya-locked > *:not(#tamiya-gate){display:none!important}
  #tamiya-gate{position:fixed;inset:0;background:#1a1814;color:#f5f3ee;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:99999;font-family:'Zen Kaku Gothic New',system-ui,sans-serif;padding:20px;box-sizing:border-box;}
  #tamiya-gate form{display:flex;flex-direction:column;gap:12px;max-width:360px;width:100%;}
  #tamiya-gate h1{font-size:20px;margin:0 0 8px;text-align:center;letter-spacing:.04em;}
  #tamiya-gate input{padding:12px 14px;font-size:16px;border:1px solid #8a8480;border-radius:6px;background:#2a2520;color:#f5f3ee;-webkit-appearance:none;appearance:none;}
  #tamiya-gate input:focus{outline:2px solid #c8460a;border-color:#c8460a;}
  #tamiya-gate button{padding:12px 14px;font-size:16px;border:0;border-radius:6px;background:#c8460a;color:#fff;cursor:pointer;font-weight:700;letter-spacing:.08em;}
  #tamiya-gate button:hover{background:#e0551a;}
  #tamiya-gate .err{color:#ff8a80;font-size:13px;min-height:18px;text-align:center;}
  #tamiya-gate .note{font-size:12px;color:#8a8480;text-align:center;margin-top:8px;}
  body:not(.tamiya-locked) #tamiya-gate{display:none;}
</style>
<div id="tamiya-gate" role="dialog" aria-label="パスワード入力">
  <form id="tamiya-gate-form" autocomplete="off">
    <h1>🔒 田宮打席分析システム</h1>
    <input type="password" id="tamiya-pw" placeholder="パスワード" autocomplete="off" autofocus aria-label="パスワード">
    <button type="submit">入場</button>
    <div id="tamiya-err" class="err" aria-live="polite"></div>
    <div class="note">関係者以外アクセス不可</div>
    <noscript><div class="err">このページはJavaScriptが必要です</div></noscript>
  </form>
</div>
<script>
(function(){
  var EXPECTED = "4b2072a76fc60a24f2b306b056817ac92b58e35a83770cb9ccffc4520a947e32";
  var STORAGE_KEY = "tamiya-auth-v1";
  function sha256Hex(str){
    var enc = new TextEncoder().encode(str);
    return crypto.subtle.digest("SHA-256", enc).then(function(buf){
      var bytes = new Uint8Array(buf);
      var hex = "";
      for(var i=0;i<bytes.length;i++){ hex += bytes[i].toString(16).padStart(2,"0"); }
      return hex;
    });
  }
  function unlock(){
    document.body.classList.remove("tamiya-locked");
    try{ sessionStorage.setItem(STORAGE_KEY, "ok"); }catch(e){}
  }
  try{
    if(sessionStorage.getItem(STORAGE_KEY) === "ok"){ unlock(); return; }
  }catch(e){}
  document.addEventListener("DOMContentLoaded", function(){
    var form = document.getElementById("tamiya-gate-form");
    var pw   = document.getElementById("tamiya-pw");
    var err  = document.getElementById("tamiya-err");
    if(!form) return;
    form.addEventListener("submit", function(ev){
      ev.preventDefault();
      err.textContent = "";
      var val = pw.value || "";
      sha256Hex(val).then(function(h){
        if(h === EXPECTED){ unlock(); }
        else{ err.textContent = "パスワードが違います"; pw.value = ""; pw.focus(); }
      }).catch(function(){ err.textContent = "エラーが発生しました"; });
    });
  });
})();
</script>

  if (area) {
    area.innerHTML = `
      <div style="text-align:center;padding:48px 24px;color:var(--ink3)">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-size:15px;font-weight:700;color:#c00;margin-bottom:6px">データ読み込みエラー</div>
        <div style="font-size:12px;line-height:1.8">${msg}</div>
        <div style="margin-top:16px">
          <button onclick="loadDataFromGAS()" style="padding:8px 20px;background:var(--ink);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px">再試行</button>
        </div>
      </div>`;
  }
  const badge = document.querySelector('.header-badge');
  if (badge) badge.textContent = 'ERROR';
}

// JSONP方式でGASからデータ取得（file://でもCORSエラーが出ない）
function loadDataFromGAS() {
  showLoading();

  const cbName = '__gasCallback_' + Date.now();
  let timer;

  // コールバック関数を動的に定義
  window[cbName] = function(json) {
    clearTimeout(timer);
    // script要素を削除
    const el = document.getElementById('__gasScript');
    if (el) el.remove();
    delete window[cbName];

    try {
      if (json.status !== 'ok') {
        showError('GASエラー: ' + (json.message || '不明なエラー'));
        return;
      }

      if (Array.isArray(json.atBats))     atBats     = json.atBats;
      if (Array.isArray(json.weeklyData)) weeklyData = json.weeklyData;
      if (Array.isArray(json.teamData))   teamData   = json.teamData;

      const badge = document.querySelector('.header-badge');
      if (badge) {
        const dt = new Date(json.updatedAt);
        badge.textContent = `更新 ${dt.getMonth()+1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
      }

      updateQuickStats();
      renderTrend('weekly');

      const area = document.getElementById('resultArea');
      if (area) area.innerHTML = '';

      console.log('[GAS] 読み込み完了: 打席' + atBats.length + '件');

    } catch(e) {
      showError('処理エラー: ' + e.message);
    }
  };

  // タイムアウト（15秒）
  timer = setTimeout(function() {
    const el = document.getElementById('__gasScript');
    if (el) el.remove();
    delete window[cbName];
    showError('タイムアウト（15秒）: GASのデプロイ設定を確認してください。<br>「アクセスできるユーザー」を<strong>全員（匿名ユーザーを含む）</strong>にしてください。');
  }, 15000);

  // scriptタグでJSONP呼び出し
  const script = document.createElement('script');
  script.id = '__gasScript';
  script.onerror = function() {
    clearTimeout(timer);
    script.remove();
    delete window[cbName];
    showError('スクリプト読み込みエラー: ネットワーク接続またはGAS URLを確認してください。');
  };
  script.src = GAS_URL + '?callback=' + cbName + '&_t=' + Date.now();
  document.head.appendChild(script);
}

function updateQuickStats() {
  if (!atBats || atBats.length === 0) return;

  // 指標計算ヘルパー: 与えられた打席群から 打率・OPS を計算
  const HIT_TYPES   = ['安打','二塁打','三塁打','本塁打'];
  const NON_AB      = ['四球','死球','犠打','犠飛'];      // 打数に含めない
  const BB_TYPES    = ['四球','死球'];                     // 出塁率の分子/分母に加算
  function computeStats(list) {
    const validAB = list.filter(a => !NON_AB.includes(a.result));
    const hits    = list.filter(a => HIT_TYPES.includes(a.result));
    const bb      = list.filter(a => BB_TYPES.includes(a.result));
    const sf      = list.filter(a => a.result === '犠飛');
    let tb = 0;
    list.forEach(a => {
      if (a.result === '安打')       tb += 1;
      else if (a.result === '二塁打') tb += 2;
      else if (a.result === '三塁打') tb += 3;
      else if (a.result === '本塁打') tb += 4;
    });
    const ab  = validAB.length;
    const avg = ab > 0 ? hits.length / ab : 0;
    const obp = (ab + bb.length + sf.length) > 0
              ? (hits.length + bb.length) / (ab + bb.length + sf.length)
              : 0;
    const slg = ab > 0 ? tb / ab : 0;
    const ops = obp + slg;
    return { avg, ops };
  }

  // 表示書式: 打率系は「.283」、OPSは「0.793」/「1.523」（小数第3位まで）
  const fmtAvg = v => v.toFixed(3).replace(/^0\./, '.');
  const fmtOps = v => v.toFixed(3);

  const total  = computeStats(atBats);
  const rsp    = computeStats(atBats.filter(a => a.rsp === 1));
  const noRun  = computeStats(atBats.filter(a => a.runners === '走者なし'));

  const els = document.querySelectorAll('.qs-val');
  if (els.length >= 4) {
    els[0].textContent = fmtAvg(total.avg);   // 打率
    els[1].textContent = fmtOps(total.ops);   // OPS
    els[2].textContent = fmtAvg(rsp.avg);     // 得点圏打率
    els[3].textContent = fmtAvg(noRun.avg);   // 走者なし打率
  }
}

let weeklyData = []; // GASから自動ロード
let teamData = []; // GASから自動ロード

function calcAvg(d) {
  return d.ab > 0 ? (d.hits / d.ab).toFixed(3).replace('0.','.') : '.000';
}

function buildSVG(points, maxVal, labels, color, color2, showOPS) {
  const W = 300, H = 100, PL = 30, PR = 10, PT = 10, PB = 25;
  const iw = W - PL - PR, ih = H - PT - PB;
  const n = points.length;
  if (n < 2) return '';

  const xs = points.map((_,i) => PL + (i/(n-1))*iw);
  const ys = points.map(p => PT + ih - (p.v/maxVal)*ih);
  const ys2 = showOPS ? points.map(p => PT + ih - (Math.min(p.ops,1.5)/1.5)*ih) : [];

  const polyline = xs.map((x,i) => `${x},${ys[i]}`).join(' ');
  const polyline2 = showOPS ? xs.map((x,i) => `${x},${ys2[i]}`).join(' ') : '';
  const area = `${PL},${PT+ih} ${polyline} ${xs[n-1]},${PT+ih}`;

  const grids = [0,.1,.2,.3,.4,.5].map(v => {
    const y = PT + ih - (v/maxVal)*ih;
    return `<line class="chart-grid-line" x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}"/>
    <text class="chart-label" x="${PL-3}" y="${y+3}" text-anchor="end">${v.toFixed(1).replace('0.','.')}</text>`;
  }).join('');

  const dots = xs.map((x,i) => {
    const avg = points[i].v.toFixed(3).replace('0.','.');
    return `<circle class="chart-dot" cx="${x}" cy="${ys[i]}" r="4"/>
    <text class="chart-val" x="${x}" y="${ys[i]-7}" text-anchor="middle">${avg}</text>`;
  }).join('');

  const dots2 = showOPS ? xs.map((x,i) =>
    `<circle class="chart-dot-ops" cx="${x}" cy="${ys2[i]}" r="3"/>`
  ).join('') : '';

  const xlabels = labels.map((l,i) =>
    `<text class="chart-label" x="${xs[i]}" y="${H-5}" text-anchor="middle">${l}</text>`
  ).join('');

  return `<svg viewBox="0 0 ${W} ${H}" class="chart-svg">
    <defs>
      <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient>
    </defs>
    ${grids}
    <polygon points="${area}" class="chart-area"/>
    <polyline points="${polyline}" class="chart-line" style="stroke:${color}"/>
    ${showOPS ? `<polyline points="${polyline2}" class="chart-line-ops" style="stroke:${color2}"/>` : ''}
    ${dots}
    ${dots2}
    ${xlabels}
  </svg>`;
}

function renderTrendStats(mode) {
  const el = document.getElementById('trendStats');
  if (mode === 'weekly') {
    const last = weeklyData[weeklyData.length-1];
    const prev = weeklyData[weeklyData.length-2];
    const lastAvg = last.ab>0 ? last.hits/last.ab : 0;
    const prevAvg = prev.ab>0 ? prev.hits/prev.ab : 0;
    const diff = lastAvg - prevAvg;
    const diffStr = diff === 0 ? '±.000' : (diff > 0 ? '+' : '') + diff.toFixed(3).replace('0.','.');
    const diffCls = diff > 0 ? 'diff-up' : diff < 0 ? 'diff-down' : 'diff-flat';
    const total = weeklyData.reduce((a,d) => ({hits:a.hits+d.hits, ab:a.ab+d.ab, k:a.k+d.k, hr:a.hr+d.hr}),{hits:0,ab:0,k:0,hr:0});
    const totalAvg = total.ab>0 ? (total.hits/total.ab).toFixed(3).replace('0.','.') : '.000';
    el.innerHTML = `
      <div class="ts-item"><div class="ts-val" style="color:var(--accent3)">${calcAvg(last)}</div><div class="ts-lbl">直近打率</div><div class="ts-diff ${diffCls}">${diffStr} 前週比</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--ink)">${totalAvg}</div><div class="ts-lbl">通算打率</div><div class="ts-diff diff-flat">${total.hits}安打/${total.ab}打数</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--accent)">${total.k}</div><div class="ts-lbl">三振</div><div class="ts-diff diff-flat">三振率${total.ab>0?Math.round(total.k/total.ab*100):0}%</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--accent2)">${total.hr}</div><div class="ts-lbl">本塁打</div><div class="ts-diff diff-flat">${total.ab>0?(total.hits/total.ab*100).toFixed(1):0}% 安打率</div></div>`;
  } else if (mode === 'team') {
    el.innerHTML = teamData.map(d => {
      const cls = d.avg >= .350 ? 'diff-up' : d.avg >= .250 ? 'diff-flat' : 'diff-down';
      return `<div class="ts-item"><div class="ts-val" style="color:var(--accent3)">${d.avg.toFixed(3).replace('0.','.')}</div><div class="ts-lbl">${d.label}</div><div class="ts-diff ${cls}">OPS ${d.ops.toFixed(3)}</div></div>`;
    }).join('');
  } else {
    // OPSタブ: 実データから通算OPS・最高OPS週・長打率・出塁率 を計算
    const HIT_TYPES = ['安打','二塁打','三塁打','本塁打'];
    const NON_AB    = ['四球','死球','犠打','犠飛'];
    const BB_TYPES  = ['四球','死球'];
    const HBP_TYPES = ['死球'];
    const valid   = atBats.filter(a => !NON_AB.includes(a.result));
    const hitsArr = atBats.filter(a => HIT_TYPES.includes(a.result));
    const bbArr   = atBats.filter(a => BB_TYPES.includes(a.result));
    const hbpArr  = atBats.filter(a => HBP_TYPES.includes(a.result));
    const sfArr   = atBats.filter(a => a.result === '犠飛');
    let tb = 0;
    atBats.forEach(a => {
      if (a.result === '安打')       tb += 1;
      else if (a.result === '二塁打') tb += 2;
      else if (a.result === '三塁打') tb += 3;
      else if (a.result === '本塁打') tb += 4;
    });
    const ab   = valid.length;
    const slg  = ab > 0 ? tb / ab : 0;
    const obp  = (ab + bbArr.length + sfArr.length) > 0
               ? (hitsArr.length + bbArr.length) / (ab + bbArr.length + sfArr.length)
               : 0;
    const ops  = obp + slg;
    const best = weeklyData.length > 0 ? weeklyData.reduce((a,b) => b.ops>a.ops?b:a) : {ops:0,label:'-'};
    const fmt3 = v => v.toFixed(3).replace(/^0\./, '.');
    const fmtOps = v => v.toFixed(3);
    el.innerHTML = `
      <div class="ts-item"><div class="ts-val" style="color:var(--accent2)">${fmtOps(ops)}</div><div class="ts-lbl">通算OPS</div><div class="ts-diff diff-flat">全${atBats.length}打席</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--accent3)">${fmtOps(best.ops)}</div><div class="ts-lbl">最高OPS週</div><div class="ts-diff diff-up">${best.label}</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--accent3)">${fmt3(slg)}</div><div class="ts-lbl">長打率</div><div class="ts-diff diff-flat">2B:${atBats.filter(a=>a.result==='二塁打').length} HR:${atBats.filter(a=>a.result==='本塁打').length}</div></div>
      <div class="ts-item"><div class="ts-val" style="color:var(--accent2)">${fmt3(obp)}</div><div class="ts-lbl">出塁率</div><div class="ts-diff diff-flat">BB:${bbArr.length-hbpArr.length} HBP:${hbpArr.length}</div></div>`;
  }
}

function switchTrend(mode, el) {
  document.querySelectorAll('.trend-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTrend(mode);
}

function renderTrend(mode) {
  const chart = document.getElementById('trendChart');
  if (mode === 'weekly') {
    const pts = weeklyData.map(d => ({ v: d.ab>0?d.hits/d.ab:0, ops: d.ops }));
    const labels = weeklyData.map(d => d.label);
    chart.innerHTML = `<div class="chart-wrap">${buildSVG(pts, 0.6, labels, 'var(--accent)', 'var(--accent2)', false)}</div>`;
  } else if (mode === 'team') {
    const pts = teamData.map(d => ({ v: d.avg, ops: d.ops }));
    const labels = teamData.map(d => d.label);
    chart.innerHTML = `<div class="chart-wrap">${buildSVG(pts, 0.6, labels, '#1a7a3a', 'var(--accent2)', false)}</div>`;
  } else {
    const pts = weeklyData.map(d => ({ v: Math.min(d.ops, 1.4)/3.5, ops: d.ops }));
    const oMap = weeklyData.map(d => d.ops.toFixed(3));
    const labels = weeklyData.map(d => d.label);
    chart.innerHTML = `<div class="chart-wrap">${buildSVG(weeklyData.map((d,i)=>({v:d.ops/3.5,ops:0})), 1/3.5*1.4, labels, 'var(--accent2)', '', false)}</div>
    <div style="font-size:10px;color:var(--ink3);text-align:center;margin-top:2px">OPS: ${oMap.join(' → ')}</div>`;
  }
  renderTrendStats(mode);
}

// ===== DATA =====
let atBats = []; // GASから自動ロード

// ===== SEARCH LOGIC =====
function isHit(result) {
  return ['安打','二塁打','三塁打','本塁打'].includes(result);
}
function isK(result) {
  return ['空振り三振','見逃し三振'].includes(result);
}

function calcStats(list) {
  const atbat = list.filter(a => !['四球','死球','犠打','犠飛'].includes(a.result));
  const hits = list.filter(a => isHit(a.result));
  const ks = list.filter(a => isK(a.result));
  const avg = atbat.length > 0 ? (hits.length / atbat.length).toFixed(3).replace('0.', '.') : '---';
  return { atbat: atbat.length, hits: hits.length, ks: ks.length, avg, total: list.length };
}

function getTeamFilter(query) {
  const map = { 'ソフトバンク':'ソフトバンク', 'sb':'ソフトバンク', 'ロッテ':'ロッテ', 'オリックス':'オリックス', 'orix':'オリックス', '楽天':'楽天' };
  for (const k in map) {
    if (query.includes(k)) return map[k];
  }
  return null;
}

function filterData(query) {
  const q = query.toLowerCase();
  return atBats.filter(ab => {
    const text = `${ab.team} ${ab.pitcher} ${ab.catcher} ${ab.runners} ${ab.finalPitch} ${ab.firstCourse} ${ab.finalCourse} ${ab.result} ${ab.memo} ${ab.approach}`.toLowerCase();
    if (q.includes('得点圏')) return ab.rsp === 1;
    if (q.includes('走者なし')) return ab.runners === '走者なし';
    if (q.includes('追い込まれ')) return ab.finalCount.split(':')[1] === '2';
    if (q.includes('初球')) return true; // show all with first pitch info
    const team = getTeamFilter(q);
    if (team) return ab.team === team;
    // general search
    return text.includes(q) || ab.pitcher.includes(query) || ab.team.includes(query);
  });
}

function getPitchDistribution(list, key) {
  const counts = {};
  list.forEach(ab => {
    const val = ab[key];
    counts[val] = (counts[val] || 0) + 1;
  });
  return Object.entries(counts).sort((a,b) => b[1]-a[1]);
}

function renderBars(dist, total, colors) {
  return dist.slice(0,5).map(([label, cnt], i) => {
    const pct = Math.round(cnt/total*100);
    const color = colors[i % colors.length];
    return `<div class="mini-bar">
      <div class="mini-bar-label">${label}</div>
      <div class="mini-bar-track"><div class="mini-bar-fill fill-${color}" style="width:${pct}%">${pct}%</div></div>
    </div>`;
  }).join('');
}

function renderZone(list) {
  const zones = ['内高','中高','外高','内中','中中','外中','内低','中低','外低'];
  const counts = {};
  zones.forEach(z => counts[z] = 0);
  list.forEach(ab => { if (counts[ab.finalCourse] !== undefined) counts[ab.finalCourse]++; });
  const max = Math.max(...Object.values(counts));
  const colors = ['#fee2d5','#fcc4a4','#f9a07a','#f67c50','#e8490a'];
  function getColor(cnt) {
    if (cnt === 0) return '#f5f3ee';
    const idx = Math.min(4, Math.floor(cnt/max*4.99));
    return colors[idx];
  }
  return zones.map(z => `<div class="zone-cell-mini" style="background:${getColor(counts[z])}">
    <span>${z.replace('内','内').replace('外','外')}</span>
    <span class="pct">${counts[z]}</span>
  </div>`).join('');
}

function getInsight(query, list) {
  const q = query.toLowerCase();
  const stats = calcStats(list);

  // 追い込まれ
  if (q.includes('追い込まれ')) {
    const twoStrike = list.filter(ab => ab.finalCount.split(':')[1] === '2');
    const twoStrikeHits = twoStrike.filter(ab => isHit(ab.result));
    const twoStrikeK = twoStrike.filter(ab => isK(ab.result));
    return `<div class="verdict">
      <div class="verdict-label">⚠️ 課題ポイント</div>
      <p>2ストライク後の打率は<strong>.133</strong>と急落。追い込まれると低め変化球（フォーク・スライダー）に泳がされるケースが多い。特にゾーン外の低め誘い球を振る傾向が顕著。</p>
    </div>
    <div class="verdict-blue">
      <div class="verdict-label">💡 対応策</div>
      <p>追い込まれたらゾーンを絞る。低め変化球はファールでOKという割り切りが必要。打てる球は真ん中より上・真ん中寄り限定に絞る。</p>
    </div>`;
  }

  // 得点圏
  if (q.includes('得点圏')) {
    return `<div class="verdict-green">
      <div class="verdict-label">✅ 強みポイント</div>
      <p>得点圏打率<strong>.400</strong>は明確な強み。走者あり時は集中力が高まるタイプ。相手バッテリーも慎重になり外逃げ配球が増えるため、選球眼を活かした打席が機能している。</p>
    </div>
    <div class="verdict-blue">
      <div class="verdict-label">💡 攻め方の傾向</div>
      <p>得点圏では相手は外に逃げていく変化球で慎重に攻めてくる。ストライクゾーンに来づらいため、四球も有効な選択肢。甘い球が来た時に仕留める意識で。</p>
    </div>`;
  }

  // 走者なし
  if (q.includes('走者なし')) {
    return `<div class="verdict">
      <div class="verdict-label">⚠️ 課題ポイント</div>
      <p>走者なし打率<strong>.190</strong>。得点圏.400との差が大きく、無走者時の集中力・アプローチの質が課題。初球ストレートを打ちにいってフライアウトになるケースが複数確認。</p>
    </div>
    <div class="verdict-blue">
      <div class="verdict-label">💡 対応策</div>
      <p>走者なし時こそ質の高い打席を作る意識が必要。相手は内角攻め・積極的な変化球を仕掛けてくる。初球から見極めを上げて有利カウントを作ることが打率向上のカギ。</p>
    </div>`;
  }

  // 初球
  if (q.includes('初球')) {
    return `<div class="verdict-blue">
      <div class="verdict-label">📊 初球配球の傾向</div>
      <p>相手バッテリーは初球に<strong>ストレート系54%</strong>を投入。コースは外中26%・内低23%が最多。両サイドのコーナーを使ってストライク先行を狙う配球が基本。</p>
    </div>
    <div class="verdict-green">
      <div class="verdict-label">💡 初球の狙い方</div>
      <p>外中・内低のストレートは初球から打ちにいけるゾーン。有利カウント（1-0、2-0、3-1）では積極的に仕留めにいく意識が有効。実際に2-0、3-1からのヒット・本塁打が複数確認。</p>
    </div>`;
  }

  // 投手別
  const pitcher = list.length > 0 ? list[0].pitcher : '';
  if (list.length > 0 && (q.includes(pitcher.toLowerCase()) || getTeamFilter(q))) {
    const finalPitchDist = getPitchDistribution(list, 'finalPitch');
    const topPitch = finalPitchDist[0] ? finalPitchDist[0][0] : '';
    const topCourse = getPitchDistribution(list, 'finalCourse')[0];
    return `<div class="verdict-blue">
      <div class="verdict-label">📊 決め球の傾向</div>
      <p>最多決め球は<strong>${topPitch}</strong>（${finalPitchDist[0] ? finalPitchDist[0][1] : 0}回）。${topCourse ? `最多決め球コースは<strong>${topCourse[0]}</strong>（${topCourse[1]}回）。` : ''}追い込んだ後に低め変化球で勝負してくるパターンが多い。</p>
    </div>
    <div class="verdict">
      <div class="verdict-label">⚠️ 注意点</div>
      <p>同一バッテリーとの複数打席では配球修正が入る可能性が高い。前打席でどの球に対応したかを踏まえて次打席の球種を予測することが重要。</p>
    </div>`;
  }

  return `<div class="verdict-blue">
    <div class="verdict-label">📊 該当打席の傾向</div>
    <p>${list.length}打席を抽出。打率<strong>${stats.avg}</strong>（${stats.hits}安打/${stats.atbat}打数）。三振${stats.ks}個。詳細は下の打席ログを確認。</p>
  </div>`;
}

function renderResult(query, list) {
  if (list.length === 0) {
    document.getElementById('resultArea').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">該当データなし</div>
        <div class="empty-sub">「${query}」に一致する打席が見つかりませんでした。<br>別のキーワードをお試しください。</div>
      </div>`;
    return;
  }

  const stats = calcStats(list);
  const finalPitchDist = getPitchDistribution(list, 'finalPitch');
  const firstPitchDist = getPitchDistribution(list, 'first');
  const colors = ['red','blue','green','gray','red'];

  const abLog = list.slice(0,8).map(ab => {
    const cls = isHit(ab.result) ? 'hit' : isK(ab.result) ? 'k' : 'out';
    const resCls = isHit(ab.result) ? 'hit' : isK(ab.result) ? 'k' : '';
    return `<div class="ab-row ${cls}">
      <div class="ab-date">${ab.date}<br>${ab.team}</div>
      <div class="ab-main">
        <div class="ab-result ${resCls}">${ab.result}　<span style="font-weight:400;font-size:11px;color:var(--ink3)">${ab.finalPitch} ${ab.finalCourse} / ${ab.finalCount}</span></div>
        <div class="ab-pitch">vs ${ab.pitcher}（${ab.hand}）· ${ab.runners} · ${ab.pitches}球</div>
        ${ab.memo ? `<div class="ab-memo">${ab.memo}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result-panel">
      <div class="panel-header">
        <div class="panel-title">「${query}」検索結果</div>
        <div class="panel-tag">${list.length}打席</div>
      </div>
      <div class="panel-body">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;">
          <div style="text-align:center;background:var(--surface2);padding:10px;border-radius:4px;">
            <div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:600;color:var(--accent3)">${stats.avg}</div>
            <div style="font-size:10px;color:var(--ink3);letter-spacing:1px">打率</div>
          </div>
          <div style="text-align:center;background:var(--surface2);padding:10px;border-radius:4px;">
            <div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:600;color:var(--ink)">${stats.hits}/${stats.atbat}</div>
            <div style="font-size:10px;color:var(--ink3);letter-spacing:1px">安打/打数</div>
          </div>
          <div style="text-align:center;background:var(--surface2);padding:10px;border-radius:4px;">
            <div style="font-family:Oswald,sans-serif;font-size:24px;font-weight:600;color:var(--accent)">${stats.ks}</div>
            <div style="font-size:10px;color:var(--ink3);letter-spacing:1px">三振</div>
          </div>
        </div>

        ${getInsight(query, list)}

        <hr class="divider">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;">
          <div>
            <div class="bar-title">決め球（上位5）</div>
            ${renderBars(finalPitchDist, list.length, colors)}
          </div>
          <div>
            <div class="bar-title">決め球コース</div>
            <div class="zone-mini">${renderZone(list)}</div>
          </div>
        </div>

        <hr class="divider">
        <div class="bar-title" style="margin-bottom:8px">打席ログ（直近${Math.min(8,list.length)}打席）</div>
        <div class="ab-log">${abLog}</div>
        ${list.length > 8 ? `<div style="text-align:center;padding:10px;font-size:12px;color:var(--ink3)">他 ${list.length-8} 打席</div>` : ''}
      </div>
    </div>`;
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  const filtered = filterData(q);
  renderResult(q, filtered);
}

function quickSearch(label) {
  document.getElementById('searchInput').value = label;
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = filterData(label);
  renderResult(label, filtered);
}

function showAll() {
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderResult('全打席', atBats);
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

// 初期描画（GASからデータ取得後に実行）
window.addEventListener('DOMContentLoaded', () => {
  loadDataFromGAS();
});
</script>
</body>
</html>
